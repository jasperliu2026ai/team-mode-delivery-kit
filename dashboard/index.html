<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团队任务看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 22px; font-weight: 600; }
    header .meta { font-size: 12px; opacity: 0.7; margin-top: 4px; }
    .refresh-badge { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .container { padding: 24px 30px; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: white; border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 140px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card .num { font-size: 32px; font-weight: 700; }
    .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
    .stat-card.blue .num { color: #1677ff; }
    .stat-card.orange .num { color: #fa8c16; }
    .stat-card.green .num { color: #52c41a; }
    .stat-card.purple .num { color: #722ed1; }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .column { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .column-header { padding: 14px 18px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .column-header .count { background: rgba(0,0,0,0.08); border-radius: 20px; padding: 2px 8px; font-size: 12px; }
    .col-todo .column-header { background: #f0f0f0; color: #555; }
    .col-doing .column-header { background: #e6f4ff; color: #1677ff; }
    .col-done .column-header { background: #f6ffed; color: #52c41a; }
    .task-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 80px; }
    .task-card { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px 14px; }
    .task-card .task-id { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .task-card .task-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .task-card .task-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .tag.high { background: #fff1f0; color: #f5222d; }
    .tag.mid { background: #fff7e6; color: #fa8c16; }
    .tag.low { background: #f6ffed; color: #52c41a; }
    .tag.person { background: #f0f5ff; color: #2f54eb; }
    .score { font-size: 12px; color: #faad14; font-weight: 600; }
    .empty-col { color: #bbb; font-size: 13px; padding: 24px; text-align: center; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #222; }
    .perf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .perf-card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
    .perf-card .avatar { font-size: 32px; margin-bottom: 8px; }
    .perf-card .name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    .perf-card .score-big { font-size: 28px; font-weight: 700; color: #faad14; }
    .bar-wrap { background: #f5f5f5; border-radius: 4px; height: 6px; margin: 8px 0 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #faad14, #ff7a00); }
    .perf-card .score-label { font-size: 12px; color: #aaa; }
    .rules-card { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 28px; }
    .rules-card ol { padding-left: 20px; }
    .rules-card li { font-size: 13px; line-height: 2; color: #444; }
    .rules-card li:last-child { color: #1677ff; font-weight: 500; }
    footer { text-align: center; padding: 20px; font-size: 12px; color: #bbb; }
    #update-time { font-size: 11px; opacity: 0.6; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏢 团队任务看板</h1>
    <div class="meta">老板: v_juvnliu &nbsp;|&nbsp; 团队: 阿总 / 阿查 / 阿干 / 阿审</div>
    <div class="meta" id="update-time">数据加载中...</div>
  </div>
  <div class="refresh-badge">⟳ 每30秒自动刷新</div>
</header>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="section-title">📋 任务看板</div>
  <div class="board" id="board"></div>
  <div class="section-title">🏆 绩效得分</div>
  <div class="perf-grid" id="perf"></div>
  <div class="section-title">📌 团队规矩</div>
  <div class="rules-card"><ol id="rules"></ol></div>
</div>

<footer>团队看板 · 数据来源 data.json · 由阿干维护</footer>

<script>
const priorityMap = { high: '🔴 高优先', mid: '🟡 中优先', low: '🟢 低优先' };
const priorityClass = { high: 'high', mid: 'mid', low: 'low' };

function renderStats(s) {
  document.getElementById('stats').innerHTML = `
    <div class="stat-card blue"><div class="num">${s.todo}</div><div class="label">待办任务</div></div>
    <div class="stat-card orange"><div class="num">${s.doing}</div><div class="label">进行中</div></div>
    <div class="stat-card green"><div class="num">${s.done}</div><div class="label">已完成</div></div>
    <div class="stat-card purple"><div class="num">${s.avg_score}</div><div class="label">平均得分</div></div>
  `;
}

function renderTask(t) {
  const scoreHtml = t.score ? `<span class="score">⭐ ${t.score}分</span>` : '';
  const priorityHtml = t.priority ? `<span class="tag ${priorityClass[t.priority]}">${priorityMap[t.priority]}</span>` : '';
  return `<div class="task-card">
    <div class="task-id">${t.id}</div>
    <div class="task-name">${t.name}</div>
    <div class="task-meta">${priorityHtml}<span class="tag person">${t.owner}</span>${scoreHtml}</div>
  </div>`;
}

function renderBoard(tasks) {
  const todoHtml = tasks.todo.length ? tasks.todo.map(renderTask).join('') : '<div class="empty-col">暂无待办任务</div>';
  const doingHtml = tasks.doing.length ? tasks.doing.map(renderTask).join('') : '<div class="empty-col">暂无进行中任务</div>';
  const doneHtml = tasks.done.length ? tasks.done.map(renderTask).join('') : '<div class="empty-col">暂无已完成任务</div>';
  document.getElementById('board').innerHTML = `
    <div class="column col-todo">
      <div class="column-header">📥 待办 <span class="count">${tasks.todo.length}</span></div>
      <div class="task-list">${todoHtml}</div>
    </div>
    <div class="column col-doing">
      <div class="column-header">⚡ 进行中 <span class="count">${tasks.doing.length}</span></div>
      <div class="task-list">${doingHtml}</div>
    </div>
    <div class="column col-done">
      <div class="column-header">✅ 已完成 <span class="count">${tasks.done.length}</span></div>
      <div class="task-list">${doneHtml}</div>
    </div>
  `;
}

function renderPerf(perf) {
  document.getElementById('perf').innerHTML = perf.map(p => `
    <div class="perf-card">
      <div class="avatar">${p.avatar}</div>
      <div class="name">[${p.role}]</div>
      <div class="score-big">${p.score}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${p.score / 5 * 100}%"></div></div>
      <div class="score-label">综合均分</div>
    </div>
  `).join('');
}

function renderRules(rules) {
  document.getElementById('rules').innerHTML = rules.map(r => `<li>${r}</li>`).join('');
}

function load() {
  fetch('data.json?t=' + Date.now())
    .then(r => r.json())
    .then(d => {
      document.getElementById('update-time').textContent = '数据更新时间：' + d.updated;
      renderStats(d.stats);
      renderBoard(d.tasks);
      renderPerf(d.performance);
      renderRules(d.rules);
    })
    .catch(() => {
      document.getElementById('update-time').textContent = '⚠️ 数据加载失败';
    });
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
